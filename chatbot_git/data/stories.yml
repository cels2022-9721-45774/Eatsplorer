version: "3.1"

stories:
  # ─────────────────────────────────────────────
  # Basic Flows
  # ─────────────────────────────────────────────
  - story: greet and help
    steps:
      - intent: greet
      - action: utter_greet
      - intent: ask_what_can_you_do
      - action: utter_what_can_you_do

  - story: greet and top restaurants
    steps:
      - intent: greet
      - action: utter_greet
      - intent: ask_top_restaurants
      - action: action_recommend_top_restaurants

  - story: greet and goodbye
    steps:
      - intent: greet
      - action: utter_greet
      - intent: goodbye
      - action: utter_goodbye

  - story: bot challenge
    steps:
      - intent: bot_challenge
      - action: utter_iamabot

  # ─────────────────────────────────────────────
  # Top Restaurants Flows
  # ─────────────────────────────────────────────
  - story: ask top restaurants
    steps:
      - intent: ask_top_restaurants
      - action: action_recommend_top_restaurants

  - story: ask best overall
    steps:
      - intent: ask_best_overall
      - action: action_best_overall

  - story: ask top n restaurants overall
    steps:
      - intent: ask_top_n_by_aspect
      - action: action_top_n_by_aspect

  # ─────────────────────────────────────────────
  # Aspect-Based Recommendation Flows
  # ─────────────────────────────────────────────
  - story: ask by aspect - food quality
    steps:
      - intent: ask_restaurant_by_aspect
        entities:
          - aspect: food_quality
      - slot_was_set:
          - aspect: food_quality
      - action: action_restaurant_by_aspect

  - story: ask by aspect - service
    steps:
      - intent: ask_restaurant_by_aspect
        entities:
          - aspect: service
      - slot_was_set:
          - aspect: service
      - action: action_restaurant_by_aspect

  - story: ask by aspect - ambiance
    steps:
      - intent: ask_restaurant_by_aspect
        entities:
          - aspect: ambiance
      - slot_was_set:
          - aspect: ambiance
      - action: action_restaurant_by_aspect

  - story: ask by aspect - price value
    steps:
      - intent: ask_restaurant_by_aspect
        entities:
          - aspect: price_value
      - slot_was_set:
          - aspect: price_value
      - action: action_restaurant_by_aspect

  - story: ask top n by aspect
    steps:
      - intent: ask_top_n_by_aspect
      - action: action_top_n_by_aspect

  - story: ask multi aspect
    steps:
      - intent: ask_multi_aspect
      - action: action_multi_aspect

  # ─────────────────────────────────────────────
  # Restaurant Info Flows
  # ─────────────────────────────────────────────
  - story: ask restaurant info
    steps:
      - intent: ask_restaurant_info
      - action: action_restaurant_info

  - story: ask restaurant info then follow up
    steps:
      - intent: ask_restaurant_info
      - action: action_restaurant_info
      - intent: ask_top_restaurants
      - action: action_recommend_top_restaurants

  # ─────────────────────────────────────────────
  # Positive/Negative Polarity Flows
  # ─────────────────────────────────────────────
  - story: ask positive restaurants
    steps:
      - intent: ask_positive_only
      - action: action_positive_only

  - story: ask negative warning
    steps:
      - intent: ask_negative_warning
      - action: action_negative_warning

  # ─────────────────────────────────────────────
  # Out of Scope and Fallback
  # ─────────────────────────────────────────────
  - story: out of scope
    steps:
      - intent: out_of_scope
      - action: utter_out_of_scope

  - story: out of scope then redirect
    steps:
      - intent: out_of_scope
      - action: utter_out_of_scope
      - intent: ask_top_restaurants
      - action: action_recommend_top_restaurants

  # ─────────────────────────────────────────────
  # Multi-turn Conversations
  # ─────────────────────────────────────────────
  - story: multi-turn aspect then restaurant info
    steps:
      - intent: ask_restaurant_by_aspect
      - action: action_restaurant_by_aspect
      - intent: ask_restaurant_info
      - action: action_restaurant_info

  - story: multi-turn top n then info
    steps:
      - intent: ask_top_n_by_aspect
      - action: action_top_n_by_aspect
      - intent: ask_restaurant_info
      - action: action_restaurant_info

  - story: multi-turn greeting aspect and goodbye
    steps:
      - intent: greet
      - action: utter_greet
      - intent: ask_restaurant_by_aspect
      - action: action_restaurant_by_aspect
      - intent: goodbye
      - action: utter_goodbye
