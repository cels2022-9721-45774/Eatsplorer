version: "3.1"

rules:
  - rule: Say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Say greet
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Respond to bot challenge
    steps:
      - intent: bot_challenge
      - action: utter_iamabot

  - rule: Handle what can you do
    steps:
      - intent: ask_what_can_you_do
      - action: utter_what_can_you_do

  - rule: Handle affirm
    steps:
      - intent: affirm
      - action: utter_affirm

  - rule: Handle deny
    steps:
      - intent: deny
      - action: utter_deny

  - rule: Handle out of scope
    steps:
      - intent: out_of_scope
      - action: utter_out_of_scope

  - rule: Handle fallback
    steps:
      - intent: nlu_fallback
      - action: utter_default

  - rule: Restaurant info with name
    steps:
      - intent: ask_restaurant_info
      - action: action_restaurant_info

  - rule: Ask best overall
    steps:
      - intent: ask_best_overall
      - action: action_best_overall

  - rule: Positive only restaurants
    steps:
      - intent: ask_positive_only
      - action: action_positive_only

  - rule: Negative warning
    steps:
      - intent: ask_negative_warning
      - action: action_negative_warning
