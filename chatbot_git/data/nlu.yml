version: "3.1"

nlu:
  # ─────────────────────────────────────────────
  # BASIC INTENTS
  # ─────────────────────────────────────────────
  - intent: greet
    examples: |
      - hi
      - hello
      - hey
      - good morning
      - good afternoon
      - good evening
      - hey there
      - hi eatsplorer
      - hello eatsplorer
      - hi there
      - howdy
      - what's up
      - sup
      - greetings
      - yo

  - intent: goodbye
    examples: |
      - bye
      - goodbye
      - see you
      - see ya
      - take care
      - later
      - good night
      - thanks bye
      - thank you bye
      - that's all
      - i'm done
      - nothing else
      - that will be all
      - thanks, goodbye

  - intent: bot_challenge
    examples: |
      - are you a bot?
      - are you a robot?
      - are you human?
      - am I talking to a real person?
      - are you AI?
      - what are you?
      - who are you?
      - what is eatsplorer?
      - tell me about yourself
      - who made you?
      - what can you do?
      - how do you work?
      - are you ChatGPT?
      - are you powered by AI?

  - intent: affirm
    examples: |
      - yes
      - yeah
      - yep
      - sure
      - of course
      - definitely
      - absolutely
      - correct
      - that's right
      - yes please
      - go ahead
      - ok
      - okay

  - intent: deny
    examples: |
      - no
      - nope
      - nah
      - not really
      - no thanks
      - never mind
      - don't bother
      - no need
      - not interested
      - skip it

  - intent: ask_what_can_you_do
    examples: |
      - what can you do?
      - how can you help me?
      - what are your features?
      - help me
      - help
      - what do you offer?
      - what kind of questions can I ask?
      - how do I use this?
      - what is this chatbot for?
      - show me what you can do
      - give me examples
      - how does this work?
      - what questions can I ask?

