      - where can I eat?
      - best food in legazpi
      - top rated restaurants
      - highly recommended restaurants
      - most popular restaurants in legazpi city
      - what's good to eat here in legazpi?
      - where to dine in legazpi city?
      - what are the must try restaurants?
      - best restaurants near legazpi
      - any good restaurant recommendations?
      - top restaurants legazpi

  - intent: ask_best_overall
    examples: |
      - what is the highest rated restaurant?
      - which restaurant has the best overall score?
